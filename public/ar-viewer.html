<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AR Viewer</title>
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #111113; overflow: hidden; }

    model-viewer {
      width: 100%;
      height: 100%;
      --poster-color: transparent;
    }

    #overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      pointer-events: none;
      z-index: 10;
    }

    #status-text {
      color: #8E8E9A;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 13px;
    }

    .spinner {
      width: 38px; height: 38px;
      border: 3px solid #FF6B3530;
      border-top-color: #FF6B35;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #ar-btn {
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      background: linear-gradient(135deg, #FF6B35, #FFB347);
      color: white;
      border: none;
      border-radius: 50px;
      padding: 14px 32px;
      font-size: 15px;
      font-weight: 700;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      cursor: pointer;
      white-space: nowrap;
      box-shadow: 0 4px 24px rgba(255,107,53,0.5);
      display: none;
      align-items: center;
      gap: 8px;
    }
    #ar-btn:active { opacity: 0.85; }

    #error-msg {
      display: none;
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      color: #f87171;
      font-family: -apple-system, sans-serif;
      font-size: 12px;
      text-align: center;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <model-viewer
    id="viewer"
    ar
    ar-modes="webxr scene-viewer quick-look"
    ar-scale="auto"
    camera-controls
    auto-rotate
    auto-rotate-delay="1500"
    shadow-intensity="1"
    environment-image="neutral"
    loading="eager"
    reveal="auto"
  >
    <button slot="ar-button" id="ar-btn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M12 2L2 7l10 5 10-5-10-5z"/>
        <path d="M2 17l10 5 10-5"/>
        <path d="M2 12l10 5 10-5"/>
      </svg>
      View in AR
    </button>
  </model-viewer>

  <!-- Loading overlay shown until 3D model is ready -->
  <div id="overlay">
    <div class="spinner"></div>
    <span id="status-text">Loading 3D model…</span>
  </div>

  <div id="error-msg">⚠ Could not load 3D model</div>

  <script>
    const viewer = document.getElementById('viewer');
    const overlay = document.getElementById('overlay');
    const arBtn = document.getElementById('ar-btn');
    const statusText = document.getElementById('status-text');
    const errorMsg = document.getElementById('error-msg');

    const params = new URLSearchParams(window.location.search);
    const src = params.get('src');
    const poster = params.get('poster');
    const name = params.get('name') || 'Item';

    if (!src) {
      statusText.textContent = 'No model provided';
    } else {
      viewer.setAttribute('src', src);
      viewer.setAttribute('alt', '3D model of ' + name);
      // Only set poster if explicitly provided — avoids showing unrelated image
      // poster is NOT set here intentionally so the 3D model shows directly
    }

    // Track loading progress
    viewer.addEventListener('progress', (e) => {
      const pct = Math.round(e.detail.totalProgress * 100);
      if (pct < 100) {
        statusText.textContent = 'Loading… ' + pct + '%';
      }
    });

    // Model fully loaded — hide spinner, show AR button
    viewer.addEventListener('load', () => {
      overlay.style.display = 'none';
      arBtn.style.display = 'flex';
    });

    // Handle load error
    viewer.addEventListener('error', () => {
      overlay.style.display = 'none';
      errorMsg.style.display = 'block';
    });

    // Notify parent frame when AR launches
    viewer.addEventListener('ar-status', (e) => {
      if (e.detail.status === 'session-started') {
        window.parent.postMessage({ type: 'ar-launched' }, '*');
      }
      if (e.detail.status === 'failed') {
        alert('AR not supported on this device or browser.');
      }
    });
  </script>
</body>
</html>
