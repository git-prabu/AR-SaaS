<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AR Viewer</title>
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #111113; overflow: hidden; }

    model-viewer {
      width: 100%;
      height: 100%;
      --poster-color: transparent;
      /* Reticle (the placement dot) — make it more visible */
      --ar-mode-prompt-color: rgba(255, 107, 53, 0.95);
    }

    #overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      pointer-events: none;
      z-index: 10;
    }

    #status-text {
      color: #8E8E9A;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 13px;
    }

    .spinner {
      width: 38px; height: 38px;
      border: 3px solid #FF6B3530;
      border-top-color: #FF6B35;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #ar-btn {
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      background: linear-gradient(135deg, #FF6B35, #FFB347);
      color: white;
      border: none;
      border-radius: 50px;
      padding: 14px 32px;
      font-size: 15px;
      font-weight: 700;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      cursor: pointer;
      white-space: nowrap;
      box-shadow: 0 4px 24px rgba(255,107,53,0.5);
      display: none;
      align-items: center;
      gap: 8px;
    }
    #ar-btn:active { opacity: 0.85; }

    #error-msg {
      display: none;
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      color: #f87171;
      font-family: -apple-system, sans-serif;
      font-size: 12px;
      text-align: center;
      white-space: nowrap;
    }

    /* In-AR scan helper — shown while the AR engine is hunting for a
       surface. Overlays the camera feed so the user knows they need to
       move the phone, not stand still. The model-viewer "ar-tracking"
       event drives display state. */
    #ar-scan-help {
      display: none;
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1000;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding-bottom: 32%;
    }
    #ar-scan-help.active { display: flex; }
    .scan-card {
      background: rgba(0,0,0,0.78);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      color: #fff;
      padding: 14px 18px;
      border-radius: 14px;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 13px;
      line-height: 1.45;
      max-width: 280px;
      text-align: center;
      box-shadow: 0 6px 28px rgba(0,0,0,0.4);
    }
    .scan-card strong { color: #FF8C53; display: block; margin-bottom: 4px; }
    .scan-icon {
      font-size: 28px;
      margin-bottom: 8px;
      animation: scan-wiggle 1.4s ease-in-out infinite;
      display: inline-block;
    }
    @keyframes scan-wiggle {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-12px) rotate(-8deg); }
      75% { transform: translateX(12px) rotate(8deg); }
    }
  </style>
</head>
<body>
  <!-- AR config (May 8 tuning):
       - ar-placement="floor" — explicit so Scene Viewer / WebXR know
         to look for horizontal planes (table tops + floor). Default
         is "floor" but explicit is clearer.
       - ar-scale="auto" — model uses its own real-world scale from
         the GLB. If a dish appears giant or tiny in AR, the GLB was
         exported in metres-incorrect units; fix at export time.
       - interaction-prompt="auto" + interaction-prompt-style="basic" —
         shows a hand-rotation hint after 1s idle so users know they
         can spin the model in the preview.
       - xr-environment — uses lighting estimation from the camera in
         WebXR for more realistic AR look (Android Chrome only). -->
  <model-viewer
    id="viewer"
    ar
    ar-modes="webxr scene-viewer quick-look"
    ar-placement="floor"
    ar-scale="auto"
    xr-environment
    camera-controls
    interaction-prompt="auto"
    interaction-prompt-style="basic"
    interaction-prompt-threshold="1500"
    auto-rotate
    auto-rotate-delay="1500"
    shadow-intensity="1.2"
    shadow-softness="0.8"
    environment-image="neutral"
    exposure="1.1"
    loading="eager"
    reveal="auto"
    quick-look-browsers="safari chrome"
  >
    <button slot="ar-button" id="ar-btn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M12 2L2 7l10 5 10-5-10-5z"/>
        <path d="M2 17l10 5 10-5"/>
        <path d="M2 12l10 5 10-5"/>
      </svg>
      View in AR
    </button>
  </model-viewer>

  <!-- Loading overlay shown until 3D model is ready -->
  <div id="overlay">
    <div class="spinner"></div>
    <span id="status-text">Loading 3D model…</span>
  </div>

  <div id="error-msg">⚠ Could not load 3D model</div>

  <!-- In-AR scan-help overlay. Renders on top of model-viewer's WebXR
       camera feed when the AR engine is still searching for a surface,
       and disappears once a plane is detected. -->
  <div id="ar-scan-help">
    <div class="scan-card">
      <div class="scan-icon">📱</div>
      <strong>Looking for a surface…</strong>
      Move your phone slowly across a well-lit table or floor. Plain or shiny surfaces take longer — point at something with texture (wood grain, fabric, patterned tile).
    </div>
  </div>

  <script>
    const viewer = document.getElementById('viewer');
    const overlay = document.getElementById('overlay');
    const arBtn = document.getElementById('ar-btn');
    const statusText = document.getElementById('status-text');
    const errorMsg = document.getElementById('error-msg');
    const scanHelp = document.getElementById('ar-scan-help');

    const params = new URLSearchParams(window.location.search);
    const src = params.get('src');
    const poster = params.get('poster');
    const name = params.get('name') || 'Item';

    if (!src) {
      statusText.textContent = 'No model provided';
    } else {
      viewer.setAttribute('src', src);
      viewer.setAttribute('alt', '3D model of ' + name);
      // Only set poster if explicitly provided — avoids showing unrelated image
      // poster is NOT set here intentionally so the 3D model shows directly
    }

    // Track loading progress
    viewer.addEventListener('progress', (e) => {
      const pct = Math.round(e.detail.totalProgress * 100);
      if (pct < 100) {
        statusText.textContent = 'Loading… ' + pct + '%';
      }
    });

    // Model fully loaded — hide spinner, show AR button
    viewer.addEventListener('load', () => {
      overlay.style.display = 'none';
      arBtn.style.display = 'flex';
    });

    // Handle load error
    viewer.addEventListener('error', () => {
      overlay.style.display = 'none';
      errorMsg.style.display = 'block';
    });

    // AR session lifecycle:
    //   - 'not-presenting' → user not in AR yet (or has exited)
    //   - 'session-started' → camera feed is up, hunting for surface
    //   - 'object-placed' → plane detected, model pinned
    //   - 'failed' → AR couldn't start at all (no support / permission denied)
    viewer.addEventListener('ar-status', (e) => {
      const status = e.detail.status;
      if (status === 'session-started') {
        scanHelp.classList.add('active');
        window.parent.postMessage({ type: 'ar-launched' }, '*');
      } else if (status === 'object-placed') {
        scanHelp.classList.remove('active');
      } else if (status === 'not-presenting') {
        scanHelp.classList.remove('active');
      } else if (status === 'failed') {
        scanHelp.classList.remove('active');
        alert('AR not supported on this device or browser. Use a recent Android Chrome or iOS Safari.');
      }
    });

    // 'ar-tracking' fires while WebXR is searching for / tracking a
    // surface. We use it to keep the scan-help visible while the
    // engine is still in 'not-tracking' or 'low-tracking' state.
    viewer.addEventListener('ar-tracking', (e) => {
      const ts = e.detail.status;
      if (ts === 'tracking') {
        // Surface found and stable — but the user still needs to TAP
        // to place. Keep the help visible until they place; on
        // 'object-placed' (above) we hide it.
      } else {
        // 'not-tracking' — engine lost the surface or is still searching.
        // Re-show the scan help if it was hidden.
        scanHelp.classList.add('active');
      }
    });
  </script>
</body>
</html>
