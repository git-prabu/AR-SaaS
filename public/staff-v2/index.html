<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>Waiter · Order &amp; Kitchen — HaloHelm</title>

<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@500;600;700;800&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="styles.css"/>

<!-- Firebase compat SDK — chosen over modular because data.js is a
     plain script tag (not type=module) so it can run synchronously
     ahead of the Babel-transformed React scripts. Compat APIs keep
     the same persisted session as the modular SDK used elsewhere
     in the app (keyed by app name + apiKey in localStorage). -->
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-auth-compat.js"></script>

<!-- React + Babel for inline JSX (same setup as the prototype) -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
</head>
<body>
<div class="page-bg">
  <div id="root"></div>
</div>

<!-- Data layer runs first (sync). Reads session from localStorage,
     boots Firebase, sets up Firestore subscriptions, populates the
     prototype-compatible window globals. -->
<script src="data.js"></script>

<!-- Prototype screen scripts in original order. Babel transforms
     them client-side. By the time these mount, data.js has already
     populated empty defaults on window — and SV2.subscribe lets the
     React tree re-render as live data lands. -->
<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="floor.jsx"></script>
<script type="text/babel" src="menu.jsx"></script>
<script type="text/babel" src="review.jsx"></script>
<script type="text/babel" src="kitchen.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
</body>
</html>
